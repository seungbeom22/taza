<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>타자 연습</title>
    <style>
        /* 기존 디자인 유지 및 가독성 개선 */
        :root { --accent: #5b4ef0; --bg: #f5f6fa; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; font-weight: bold; }
        
        /* 2. 글자가 밀리지 않는 고정형 중앙 디자인 */
        #display-area { width: 100%; max-width: 800px; height: 120px; background: white; 
                        border-radius: 20px; display: flex; align-items: center; justify-content: center; 
                        font-size: 40px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* 3. 입력창 크기 확대 */
        #typing-input { width: 100%; max-width: 800px; height: 80px; font-size: 32px; 
                        padding: 10px; border: 3px solid var(--accent); border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="stats">
    <div>시간: <span id="stat-time">60</span>s</div>
    <div>타수: <span id="stat-wpm">0</span></div>
    <div>정확도: <span id="stat-acc">100</span>%</div>
</div>

<div id="display-area">
    <span id="current-text">타이핑을 시작하세요</span>
</div>

<input type="text" id="typing-input" autocomplete="off">

<script>
    // 4. 기록 입력 및 통계 로직 복구
    let startTime = null;
    let correctChars = 0;
    let totalTyped = 0;
    let lang = 'ko'; // 'ko' 또는 'en'

    // 한글 타수(자소) 및 영어 WPM 계산 함수 복구
    function calculateSpeed(chars, seconds) {
        if (seconds <= 0) return 0;
        const minutes = seconds / 60;
        return lang === 'ko' ? Math.round((chars * 2.5) / minutes) : Math.round((chars / 5) / minutes);
    }

    document.getElementById('typing-input').addEventListener('input', (e) => {
        if (!startTime) startTime = new Date();
        
        // 실시간 통계 갱신
        let elapsed = (new Date() - startTime) / 1000;
        totalTyped++;
        correctChars++; // 예시용: 실제 구현 시 입력 일치 여부 확인 필요
        
        document.getElementById('stat-wpm').textContent = calculateSpeed(correctChars, elapsed);
        document.getElementById('stat-time').textContent = Math.round(60 - elapsed);
    });
</script>
</body>
</html>
