<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타자 연습</title>
    <link href="https://fonts.googleapis.com/css2?family=Gugi&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #e8f4fd;
            --surface: #ffffff;
            --surface2: #f0f8fe;
            --border: #b8ddf0;
            --border2: #cce8f5;
            --accent: #1a8fc4;
            --accent2: #e85d7b;
            --accent3: #2eb87e;
            --text: #1a2a3a;
            --text2: #3a5570;
            --muted: #7aabb8;
            --shadow: rgba(26,143,196,0.12);
            --word-active: #0d6fa0;
            --word-done: #a8d4e8;
            --word-next: #5ba8c8;
            --word-far: #9ec9de;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 32px 40px 60px;
            background-image:
                radial-gradient(ellipse at 15% 20%, rgba(100,200,255,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 80%, rgba(26,143,196,0.1) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a8fc4' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* ── 헤더 ── */
        .header {
            display: flex; flex-direction: column; align-items: flex-start;
            width: 100%; max-width: 1140px; margin-bottom: 24px; gap: 14px;
        }
        .header-top { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        h1 { font-family: 'Gugi', cursive; font-size: 24px; letter-spacing: 3px; color: var(--accent); }
        h1 span { color: var(--text2); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; font-weight: 300; letter-spacing: 1px; margin-left: 12px; }

        .controls {
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 14px; padding: 8px 12px;
            box-shadow: 0 2px 10px var(--shadow); width: 100%;
        }
        .ctrl-group-label {
            font-size: 10px; letter-spacing: 1.5px; color: var(--muted);
            text-transform: uppercase; white-space: nowrap; padding: 0 4px;
        }
        .btn-group { display: flex; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
        .ctrl-btn {
            padding: 6px 16px; border: none; background: transparent;
            color: var(--muted); font-family: 'Noto Sans KR', sans-serif;
            font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.18s; white-space: nowrap;
        }
        .ctrl-btn:hover { color: var(--accent); background: rgba(26,143,196,0.07); }
        .ctrl-btn.active { background: var(--accent); color: white; }
        .divider-v { width: 1.5px; background: var(--border); }
        .sep { width: 1.5px; height: 20px; background: var(--border); margin: 0 4px; }

        /* ── 스탯 바 ── */
        .stats { display: flex; gap: 14px; width: 100%; max-width: 1140px; margin-bottom: 24px; }
        .stat-box {
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 14px; padding: 12px 20px; text-align: center; flex: 1;
            box-shadow: 0 2px 12px var(--shadow); transition: transform 0.15s;
        }
        .stat-box:hover { transform: translateY(-2px); }
        .stat-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; color: var(--accent); }
        .stat-value.timer-val { color: #e07b2a; }
        .stat-value.cpm-val   { color: #2eb87e; }
        .stat-value.acc-val   { color: #9b5de5; }
        .stat-value.countdown-val { color: #e07b2a; font-size: 32px; }
        .stat-box.countdown-urgent .stat-value { color: var(--accent2); animation: pulse 0.6s ease infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

        /* ── 낱말 모드 ── */
        #word-mode { width: 100%; max-width: 1140px; }
        .word-lane {
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 18px; padding: 32px 48px; margin-bottom: 20px;
            box-shadow: 0 4px 24px var(--shadow); min-height: 140px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .word-lane::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent), #74d0f0, var(--accent));
            border-radius: 18px 18px 0 0;
        }
        .word-queue { display: flex; align-items: center; gap: 28px; flex-wrap: nowrap; justify-content: center; }
        .wq-item { font-family: 'Gugi', cursive; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; user-select: none; }
        .wq-item.done   { font-size: 26px; color: var(--word-done); opacity: 0.5; transform: scale(0.85); }
        .wq-item.active { font-size: 68px; color: var(--word-active); text-shadow: 0 2px 16px rgba(26,143,196,0.2); }
        .wq-item.active.error { color: var(--accent2); text-shadow: 0 0 20px rgba(232,93,123,0.3); animation: shakeWord 0.22s ease; }
        .wq-item.next1  { font-size: 42px; color: var(--word-next); opacity: 0.7; }
        .wq-item.next2  { font-size: 28px; color: var(--word-far); opacity: 0.45; }
        .wq-item.next3  { font-size: 20px; color: var(--word-far); opacity: 0.28; }
        @keyframes shakeWord { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        @keyframes wordPop { 0% { transform: scale(1); } 40% { transform: scale(1.1); color: var(--accent3); } 100% { transform: scale(1); } }
        .wq-item.pop { animation: wordPop 0.28s ease; }

        .progress-track { height: 4px; background: var(--border2); border-radius: 4px; margin-bottom: 16px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #74d0f0); border-radius: 4px; transition: width 0.1s linear; }

        /* ── 장문 모드 ── */
        #para-mode { width: 100%; max-width: 1140px; display: none; }
        .para-display-box {
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 18px; padding: 32px 52px; margin-bottom: 18px;
            box-shadow: 0 4px 24px var(--shadow); position: relative; min-height: 120px;
        }
        .para-display-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #2eb87e, #74d0f0, #9b5de5); border-radius: 18px 18px 0 0;
        }
        #para-text { font-family: 'Noto Sans KR', sans-serif; font-size: 26px; line-height: 1.9; letter-spacing: 2px; color: var(--text2); word-break: keep-all; }
        #para-text .char-done   { color: var(--accent3); }
        #para-text .char-error  { color: var(--accent2); background: rgba(232,93,123,0.12); border-radius: 2px; }
        #para-text .char-cursor { border-left: 2px solid var(--accent); animation: blink 0.9s step-end infinite; }
        #para-text .char-pending{ color: var(--muted); opacity: 0.55; }
        @keyframes blink { 50% { border-color: transparent; } }

        /* ── 입력창 ── */
        .input-wrapper { position: relative; width: 100%; max-width: 1140px; }
        #input-area {
            font-family: 'JetBrains Mono', monospace; font-size: 22px;
            padding: 16px 32px; width: 100%;
            background: var(--surface); border: 2px solid var(--border);
            border-radius: 14px; color: var(--text); outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            caret-color: var(--accent); box-shadow: 0 2px 12px var(--shadow); letter-spacing: 1px;
        }
        #input-area:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(26,143,196,0.12); }
        #input-area.error { border-color: var(--accent2); box-shadow: 0 0 0 4px rgba(232,93,123,0.1); background: #fff5f7; }
        #input-area:disabled { opacity: 0.4; cursor: not-allowed; }
        .input-hint { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--muted); letter-spacing: 1px; pointer-events: none; }

        /* ── 하단 버튼 ── */
        .reset-row { display: flex; justify-content: flex-end; width: 100%; max-width: 1140px; margin-top: 14px; gap: 10px; }
        .reset-btn {
            padding: 8px 22px; border-radius: 10px; border: 1.5px solid var(--border);
            background: var(--surface); color: var(--text2); font-family: 'Noto Sans KR', sans-serif;
            font-size: 13px; cursor: pointer; transition: all 0.18s; box-shadow: 0 1px 6px var(--shadow);
        }
        .reset-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
        .reset-btn.history-btn { color: var(--accent); border-color: var(--accent); }

        /* ── 결과 오버레이 ── */
        .overlay {
            position: fixed; inset: 0; background: rgba(14,30,50,0.55);
            backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .overlay.show { opacity: 1; pointer-events: all; }

        /* ── 결과 카드 ── */
        .result-card {
            background: var(--surface); border-radius: 24px; padding: 44px 56px;
            box-shadow: 0 16px 60px rgba(26,143,196,0.22); max-width: 560px; width: 90%;
            position: relative; transform: translateY(20px); transition: transform 0.3s;
            border: 1.5px solid var(--border);
        }
        .overlay.show .result-card { transform: translateY(0); }

        .result-title {
            font-family: 'Gugi', cursive; font-size: 22px; color: var(--accent);
            text-align: center; margin-bottom: 8px; letter-spacing: 2px;
        }
        .result-sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 32px; }

        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
        .result-item {
            background: var(--surface2); border: 1.5px solid var(--border);
            border-radius: 14px; padding: 16px 20px; text-align: center;
        }
        .result-item .r-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
        .result-item .r-value { font-family: 'JetBrains Mono', monospace; font-size: 34px; font-weight: 700; color: var(--accent); }
        .result-item .r-value.g { color: #2eb87e; }
        .result-item .r-value.p { color: #9b5de5; }
        .result-item .r-value.o { color: #e07b2a; }

        .result-meta { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 28px; }

        .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .r-btn {
            padding: 11px 28px; border-radius: 12px; font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.18s; border: 1.5px solid;
        }
        .r-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
        .r-btn.primary:hover { background: #1578a8; }
        .r-btn.secondary { background: var(--surface); color: var(--text2); border-color: var(--border); }
        .r-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }
        .r-btn.shot { background: #2eb87e; color: white; border-color: #2eb87e; }
        .r-btn.shot:hover { background: #279e6c; }
        .r-btn.shot:disabled { opacity: 0.45; cursor: not-allowed; background: var(--muted); border-color: var(--muted); }

        /* ── 기록 오버레이 ── */
        .history-overlay {
            position: fixed; inset: 0; background: rgba(14,30,50,0.55);
            backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .history-overlay.show { opacity: 1; pointer-events: all; }

        .history-card {
            background: var(--surface); border-radius: 24px; padding: 36px 48px;
            box-shadow: 0 16px 60px rgba(26,143,196,0.22); max-width: 760px; width: 92%;
            max-height: 80vh; display: flex; flex-direction: column;
            border: 1.5px solid var(--border); transform: translateY(20px); transition: transform 0.3s;
        }
        .history-overlay.show .history-card { transform: translateY(0); }

        .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .history-title { font-family: 'Gugi', cursive; font-size: 20px; color: var(--accent); letter-spacing: 2px; }
        .close-btn { background: none; border: none; font-size: 22px; color: var(--muted); cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: all 0.15s; }
        .close-btn:hover { color: var(--text); background: var(--surface2); }

        .history-list { overflow-y: auto; flex: 1; }
        .history-empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 15px; }

        .h-row {
            display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
            gap: 12px; padding: 12px 16px; border-radius: 12px;
            border-bottom: 1px solid var(--border2); align-items: center;
            transition: background 0.15s;
        }
        .h-row:hover { background: var(--surface2); }
        .h-row.header { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; border-bottom: 2px solid var(--border); }
        .h-row .hv { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--accent); }
        .h-row .hv.g { color: #2eb87e; }
        .h-row .hv.p { color: #9b5de5; }
        .h-row .hd { font-size: 13px; color: var(--text2); }
        .h-row .htag {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 500; background: var(--surface2);
            color: var(--accent); border: 1px solid var(--border);
        }

        .history-footer { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
        .clear-btn { padding: 8px 20px; border-radius: 10px; border: 1.5px solid #e85d7b; color: #e85d7b; background: none; font-size: 13px; cursor: pointer; transition: all 0.18s; font-family: 'Noto Sans KR', sans-serif; }
        .clear-btn:hover { background: rgba(232,93,123,0.08); }

        /* ── +1 피드백 ── */
        .feedback { position: fixed; font-family: 'Gugi', cursive; font-size: 26px; color: var(--accent3); pointer-events: none; animation: floatUp 0.65s ease forwards; z-index: 9999; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-60px) scale(1.25); } }

        /* ── 캡처 대상 영역 ── */
        #capture-target {
            background: var(--surface); border-radius: 20px; padding: 32px 44px;
            border: 1.5px solid var(--border);
        }
        .capture-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .capture-title { font-family: 'Gugi', cursive; font-size: 18px; color: var(--accent); letter-spacing: 2px; }
        .capture-date { font-size: 12px; color: var(--muted); }
    </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
    <div class="header-top">
        <h1>타자 연습 <span>TYPING TRAINER</span></h1>
    </div>
    <div class="controls">
        <span class="ctrl-group-label">모드</span>
        <div class="btn-group">
            <button class="ctrl-btn active" id="btn-word" onclick="setGameMode('word')">낱말</button>
            <div class="divider-v"></div>
            <button class="ctrl-btn" id="btn-para" onclick="setGameMode('para')">장문</button>
        </div>
        <div class="sep"></div>
        <span class="ctrl-group-label">언어</span>
        <div class="btn-group">
            <button class="ctrl-btn active" id="btn-ko" onclick="setLanguage('ko')">한국어</button>
            <div class="divider-v"></div>
            <button class="ctrl-btn" id="btn-en" onclick="setLanguage('en')">English</button>
        </div>
        <div class="sep"></div>
        <span class="ctrl-group-label">시간</span>
        <div class="btn-group" id="time-btns">
            <button class="ctrl-btn active" id="btn-free" onclick="setTimeLimit(0)">자유</button>
            <div class="divider-v"></div>
            <button class="ctrl-btn" id="btn-1m"  onclick="setTimeLimit(60)">1분</button>
            <div class="divider-v"></div>
            <button class="ctrl-btn" id="btn-3m"  onclick="setTimeLimit(180)">3분</button>
            <div class="divider-v"></div>
            <button class="ctrl-btn" id="btn-5m"  onclick="setTimeLimit(300)">5분</button>
        </div>
    </div>
</div>

<!-- 스탯 -->
<div class="stats">
    <div class="stat-box">
        <div class="stat-label">점수</div>
        <div class="stat-value" id="score-disp">0</div>
    </div>
    <div class="stat-box" id="timer-box">
        <div class="stat-label" id="timer-label">경과 시간</div>
        <div class="stat-value timer-val" id="timer-disp">0s</div>
    </div>
    <div class="stat-box">
        <div class="stat-label">타수 (CPM)</div>
        <div class="stat-value cpm-val" id="cpm-disp">0</div>
    </div>
    <div class="stat-box">
        <div class="stat-label">정확도</div>
        <div class="stat-value acc-val" id="acc-disp">—</div>
    </div>
</div>

<!-- 낱말 모드 -->
<div id="word-mode">
    <div class="word-lane">
        <div class="word-queue" id="word-queue"></div>
    </div>
    <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:100%"></div>
    </div>
</div>

<!-- 장문 모드 -->
<div id="para-mode">
    <div class="para-display-box">
        <div id="para-text"></div>
    </div>
</div>

<!-- 입력창 -->
<div class="input-wrapper">
    <input type="text" id="input-area" placeholder="여기에 입력하세요…" autocomplete="off" autofocus spellcheck="false">
    <span class="input-hint" id="input-hint">ENTER / SPACE로 다음 단어</span>
</div>
<div class="reset-row">
    <button class="reset-btn history-btn" onclick="openHistory()">📋 기록 보기</button>
    <button class="reset-btn" onclick="resetAll()">↺ 다시 시작</button>
</div>

<!-- ── 결과 오버레이 ── -->
<div class="overlay" id="result-overlay">
    <div class="result-card" id="capture-target">
        <div class="capture-header">
            <div class="capture-title">타자 연습 결과</div>
            <div class="capture-date" id="result-date"></div>
        </div>
        <div class="result-grid" id="result-grid"></div>
        <div class="result-meta" id="result-meta"></div>
        <div class="result-actions">
            <button class="r-btn shot" id="shot-btn" onclick="takeShot()">📷 스크린샷 저장</button>
            <button class="r-btn primary" onclick="closeResult(); resetAll();">다시 도전</button>
            <button class="r-btn secondary" onclick="closeResult()">닫기</button>
        </div>
    </div>
</div>

<!-- ── 기록 오버레이 ── -->
<div class="history-overlay" id="history-overlay">
    <div class="history-card">
        <div class="history-header">
            <div class="history-title">📋 내 기록</div>
            <button class="close-btn" onclick="closeHistory()">✕</button>
        </div>
        <div class="history-list" id="history-list"></div>
        <div class="history-footer">
            <button class="clear-btn" onclick="clearHistory()">전체 삭제</button>
        </div>
    </div>
</div>

<script>
// ════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════
const DATA = {
    word: {
        ko: ["사과","바나나","컴퓨터","코딩","하늘","바다","자동차","선생님","강아지","고양이","학교","도서관","행복","사랑","꿈","자유","지식","과학","음악","그림","노래","춤","영화","여행","산","강","바람","구름","봄","여름","가을","겨울","달","별","태양","우주","지구","인터넷","스마트폰","키보드","마우스","모니터","소프트웨어","알고리즘","데이터","인공지능","로봇","미래","창의력","도전","성공","노력","집중"],

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let lang = 'ko', gameMode = 'word', timeLimit = 0; // 0 = 자유
let wordQueue = [], wordIndex = 0;
let paraText = '', paraPos = 0, paraErrors = 0;
let score = 0, totalChars = 0, totalAttempts = 0;
let startTime = null, timerInterval = null, countdownLeft = 0;
let isComposing = false, gameOver = false;
let shotTaken = false; // 스크린샷 1회 제한

// DOM
const inputEl      = document.getElementById('input-area');
const scoreEl      = document.getElementById('score-disp');
const cpmEl        = document.getElementById('cpm-disp');
const timerEl      = document.getElementById('timer-disp');
const timerLabel   = document.getElementById('timer-label');
const timerBox     = document.getElementById('timer-box');
const accEl        = document.getElementById('acc-disp');
const wordQueueEl  = document.getElementById('word-queue');
const progressFill = document.getElementById('progress-fill');
const paraTextEl   = document.getElementById('para-text');
const wordModeEl   = document.getElementById('word-mode');
const paraModeEl   = document.getElementById('para-mode');
const inputHint    = document.getElementById('input-hint');

// ════════════════════════════════════════════
//  TIMER
// ════════════════════════════════════════════
function startTimer() {
    if (timerInterval) return;
    startTime = Date.now();
    if (timeLimit > 0) {
        countdownLeft = timeLimit;
        timerLabel.textContent = '남은 시간';
        timerEl.textContent = fmtSec(countdownLeft);
        timerEl.className = 'stat-value countdown-val';
    } else {
        timerLabel.textContent = '경과 시간';
        timerEl.className = 'stat-value timer-val';
    }
    timerInterval = setInterval(() => {
        if (timeLimit > 0) {
            countdownLeft = Math.max(0, timeLimit - Math.floor((Date.now() - startTime) / 1000));
            timerEl.textContent = fmtSec(countdownLeft);
            timerBox.classList.toggle('countdown-urgent', countdownLeft <= 10);
            if (countdownLeft === 0) { endGame(); }
        } else {
            const s = Math.floor((Date.now() - startTime) / 1000);
            timerEl.textContent = s + 's';
        }
        updateCPM();
    }, 300);
}

function fmtSec(s) {
    const m = Math.floor(s / 60), ss = s % 60;
    return m > 0 ? m + ':' + String(ss).padStart(2,'0') : ss + 's';
}

function resetTimer() {
    clearInterval(timerInterval); timerInterval = null; startTime = null;
    timerBox.classList.remove('countdown-urgent');
    if (timeLimit > 0) {
        timerEl.textContent = fmtSec(timeLimit);
        timerEl.className = 'stat-value countdown-val';
        timerLabel.textContent = '남은 시간';
    } else {
        timerEl.textContent = '0s';
        timerEl.className = 'stat-value timer-val';
        timerLabel.textContent = '경과 시간';
    }
}

function updateCPM() {
    if (!startTime || totalChars === 0) return;
    const mins = (Date.now() - startTime) / 60000;
    cpmEl.textContent = Math.round(totalChars / mins);
}

function updateAccuracy() {
    if (totalAttempts === 0) { accEl.textContent = '—'; return; }
    accEl.textContent = Math.round((totalChars / totalAttempts) * 100) + '%';
}

// ════════════════════════════════════════════
//  GAME OVER
// ════════════════════════════════════════════
function endGame() {
    if (gameOver) return;
    gameOver = true;
    clearInterval(timerInterval); timerInterval = null;
    inputEl.disabled = true;
    const elapsed = startTime ? (Date.now() - startTime) / 60000 : 0;
    const finalCPM = elapsed > 0 && totalChars > 0 ? Math.round(totalChars / elapsed) : 0;
    const finalAcc = totalAttempts > 0 ? Math.round((totalChars / totalAttempts) * 100) : 0;
    const modeName = gameMode === 'word' ? '낱말' : '장문';
    const timeName = timeLimit === 0 ? '자유' : fmtSec(timeLimit);

    // 기록 저장
    const rec = {
        date: new Date().toLocaleString('ko-KR'),
        mode: modeName + ' / ' + lang.toUpperCase() + ' / ' + timeName,
        score, cpm: finalCPM, acc: finalAcc,
        chars: totalChars
    };
    saveRecord(rec);

    // 결과 카드
    shotTaken = false;
    document.getElementById('shot-btn').disabled = false;
    document.getElementById('shot-btn').textContent = '📷 스크린샷 저장';
    document.getElementById('result-date').textContent = rec.date;
    document.getElementById('result-meta').textContent =
        `모드: ${modeName}  |  ${lang === 'ko' ? '한국어' : 'English'}  |  제한: ${timeName}  |  총 ${totalChars}자`;

    document.getElementById('result-grid').innerHTML = `
        <div class="result-item"><div class="r-label">점수 (단어수)</div><div class="r-value">${score}</div></div>
        <div class="result-item"><div class="r-label">타수 CPM</div><div class="r-value g">${finalCPM}</div></div>
        <div class="result-item"><div class="r-label">정확도</div><div class="r-value p">${finalAcc}%</div></div>
        <div class="result-item"><div class="r-label">총 타수</div><div class="r-value o">${totalChars}</div></div>
    `;

    setTimeout(() => document.getElementById('result-overlay').classList.add('show'), 200);
}

function closeResult() {
    document.getElementById('result-overlay').classList.remove('show');
}

// ════════════════════════════════════════════
//  SCREENSHOT (1회만)
// ════════════════════════════════════════════
function takeShot() {
    if (shotTaken) return;
    const btn = document.getElementById('shot-btn');
    btn.disabled = true;
    btn.textContent = '⏳ 처리 중…';

    const target = document.getElementById('capture-target');
    html2canvas(target, { scale: 2, backgroundColor: '#ffffff', useCORS: true }).then(canvas => {
        const link = document.createElement('a');
        const now = new Date();
        const fname = `타자연습_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.png`;
        link.download = fname;
        link.href = canvas.toDataURL('image/png');
        link.click();
        shotTaken = true;
        btn.textContent = '✅ 저장 완료';
    }).catch(() => {
        btn.disabled = false;
        btn.textContent = '📷 스크린샷 저장';
    });
}

// ════════════════════════════════════════════
//  HISTORY (localStorage)
// ════════════════════════════════════════════
function loadRecords() {
    try { return JSON.parse(localStorage.getItem('typer_records') || '[]'); } catch { return []; }
}
function saveRecord(rec) {
    const recs = loadRecords();
    recs.unshift(rec); // 최신 먼저
    if (recs.length > 100) recs.length = 100;
    localStorage.setItem('typer_records', JSON.stringify(recs));
}
function clearHistory() {
    if (!confirm('기록을 모두 삭제할까요?')) return;
    localStorage.removeItem('typer_records');
    renderHistory();
}
function openHistory() {
    renderHistory();
    document.getElementById('history-overlay').classList.add('show');
}
function closeHistory() {
    document.getElementById('history-overlay').classList.remove('show');
}
function renderHistory() {
    const recs = loadRecords();
    const el = document.getElementById('history-list');
    if (recs.length === 0) {
        el.innerHTML = '<div class="history-empty">아직 기록이 없습니다.<br>게임을 완료하면 자동으로 저장됩니다.</div>';
        return;
    }
    let html = `<div class="h-row header"><div>날짜 / 모드</div><div>점수</div><div>CPM</div><div>정확도</div><div>총 타수</div></div>`;
    recs.forEach(r => {
        html += `<div class="h-row">
            <div><div class="hd">${r.date}</div><span class="htag">${r.mode}</span></div>
            <div class="hv">${r.score}</div>
            <div class="hv g">${r.cpm}</div>
            <div class="hv p">${r.acc}%</div>
            <div class="hv" style="color:var(--text2);font-size:15px">${r.chars}</div>
        </div>`;
    });
    el.innerHTML = html;
}

// ════════════════════════════════════════════
//  WORD MODE
// ════════════════════════════════════════════
function buildWordQueue() {
    const list = DATA.word[lang];
    wordQueue = ['', ''];
    for (let i = 0; i < 40; i++) wordQueue.push(list[Math.floor(Math.random() * list.length)]);
    wordIndex = 2;
}
function refillQueue() {
    const list = DATA.word[lang];
    if (wordIndex > wordQueue.length - 6)
        for (let i = 0; i < 12; i++) wordQueue.push(list[Math.floor(Math.random() * list.length)]);
}
function renderWordQueue() {
    wordQueueEl.innerHTML = '';
    [[-2,'done'],[-1,'done'],[0,'active'],[1,'next1'],[2,'next2'],[3,'next3']].forEach(([off, cls]) => {
        const idx = wordIndex + off;
        if (idx < 0 || idx >= wordQueue.length || !wordQueue[idx]) return;
        const el = document.createElement('span');
        el.className = 'wq-item ' + cls;
        if (off === 0) el.id = 'wq-active';
        el.textContent = wordQueue[idx];
        wordQueueEl.appendChild(el);
    });
}
function wordModeCheck() {
    if (isComposing || gameOver) return;
    const val = inputEl.value.trim();
    if (!val) return;
    if (!startTime) startTimer();
    const target = wordQueue[wordIndex] || '';
    totalAttempts += val.length;

    const matchLen = [...val].filter((c,i) => c === ([...target][i]||'')).length;
    progressFill.style.width = Math.min(100,(matchLen/target.length)*100)+'%';

    if (!target.startsWith(val)) {
        inputEl.classList.add('error');
        const a = document.getElementById('wq-active');
        if (a) { a.classList.add('error'); setTimeout(()=>a.classList.remove('error'),250); }
        setTimeout(() => { inputEl.value=''; inputEl.classList.remove('error'); progressFill.style.width='100%'; }, 280);
        return;
    }
    inputEl.classList.remove('error');
    if (val === target) {
        score++; totalChars += target.length;
        scoreEl.textContent = score;
        updateAccuracy(); updateCPM();
        spawnFeedback('+1');
        wordIndex++; refillQueue(); renderWordQueue();
        inputEl.value = ''; progressFill.style.width = '100%';
        setTimeout(() => {
            const a = document.getElementById('wq-active');
            if (a) { a.classList.add('pop'); setTimeout(()=>a.classList.remove('pop'),300); }
        }, 20);
    }
}

// ════════════════════════════════════════════
//  PARA MODE
// ════════════════════════════════════════════
function loadParagraph() {
    const list = DATA.para[lang];
    paraText = list[Math.floor(Math.random()*list.length)];
    paraPos = 0; paraErrors = 0; renderPara();
}
function renderPara() {
    let html = '';
    for (let i = 0; i < paraText.length; i++) {
        const ch = paraText[i] === ' ' ? '&nbsp;' : paraText[i];
        if (i < paraPos)       html += `<span class="char-done">${ch}</span>`;
        else if (i === paraPos) html += `<span class="char-cursor char-pending">${ch}</span>`;
        else                   html += `<span class="char-pending">${ch}</span>`;
    }
    paraTextEl.innerHTML = html;
}
function paraModeCheck() {
    if (isComposing || gameOver) return;
    const val = inputEl.value;
    if (!val) return;
    if (!startTime) startTimer();
    const last = val[val.length-1];
    const expected = paraText[paraPos];
    totalAttempts++;
    if (last === expected) {
        totalChars++; paraPos++;
        inputEl.value = ''; inputEl.classList.remove('error');
        renderPara(); updateCPM(); updateAccuracy();
        if (paraPos >= paraText.length) {
            score++; scoreEl.textContent = score;
            spawnFeedback('완성!');
            setTimeout(() => { loadParagraph(); inputEl.value = ''; }, 600);
        }
    } else {
        paraErrors++;
        inputEl.classList.add('error'); inputEl.value = '';
        setTimeout(() => inputEl.classList.remove('error'), 250);
        updateAccuracy();
    }
}

// ════════════════════════════════════════════
//  MODE / LANG / TIME SWITCH
// ════════════════════════════════════════════
function setGameMode(mode) {
    gameMode = mode;
    ['word','para'].forEach(m => document.getElementById('btn-'+m).classList.toggle('active', m===mode));
    wordModeEl.style.display = mode==='word' ? 'block':'none';
    paraModeEl.style.display = mode==='para' ? 'block':'none';
    inputHint.textContent = mode==='word' ? 'ENTER / SPACE로 다음 단어' : '한 글자씩 입력하세요';
    resetAll();
}
function setLanguage(l) {
    lang = l;
    document.getElementById('btn-ko').classList.toggle('active', l==='ko');
    document.getElementById('btn-en').classList.toggle('active', l==='en');
    resetAll();
}
function setTimeLimit(sec) {
    timeLimit = sec;
    ['free','1m','3m','5m'].forEach((id,i) => {
        document.getElementById('btn-'+id).classList.toggle('active', [0,60,180,300][i]===sec);
    });
    resetAll();
}

function resetAll() {
    gameOver = false;
    score = 0; totalChars = 0; totalAttempts = 0;
    scoreEl.textContent = '0'; cpmEl.textContent = '0'; accEl.textContent = '—';
    resetTimer();
    inputEl.value = ''; inputEl.disabled = false; inputEl.classList.remove('error');
    closeResult();
    if (gameMode === 'word') { buildWordQueue(); renderWordQueue(); progressFill.style.width='100%'; }
    else loadParagraph();
    inputEl.focus();
}

// ════════════════════════════════════════════
//  INPUT EVENTS
// ════════════════════════════════════════════
inputEl.addEventListener('compositionstart', () => { isComposing = true; });
inputEl.addEventListener('compositionend',   () => { isComposing = false; checkInput(); });
inputEl.addEventListener('input', () => { if (!isComposing) checkInput(); });
inputEl.addEventListener('keydown', e => {
    if (gameMode==='word' && (e.key===' '||e.key==='Enter')) { e.preventDefault(); checkInput(); }
});

function checkInput() {
    if (gameMode==='word') wordModeCheck(); else paraModeCheck();
}

// ════════════════════════════════════════════
//  FEEDBACK
// ════════════════════════════════════════════
function spawnFeedback(text) {
    const el = document.createElement('div');
    el.className = 'feedback'; el.textContent = text;
    const ref = gameMode==='word' ? wordQueueEl : paraTextEl;
    const rect = ref.getBoundingClientRect();
    el.style.left = (rect.left + rect.width/2 - 20) + 'px';
    el.style.top  = (rect.top + 10) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 700);
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
setGameMode('word');
</script>
