<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>타자 연습</title>
<style>
  :root { --accent: #5b4ef0; --bg: #f5f6fa; --text: #1a1d27; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
  
  /* 입력란 크기 대폭 확대 */
  #typing-input {
    width: 100%; max-width: 800px;
    height: 80px; font-size: 32px; padding: 20px;
    border: 2px solid var(--accent); border-radius: 16px;
    text-align: center; outline: none;
  }

  /* 옛날 방식의 중앙 정렬 낱말 모드 */
  #word-display {
    width: 100%; max-width: 800px; height: 150px;
    display: flex; justify-content: center; align-items: center;
    background: white; border-radius: 20px; margin-bottom: 20px;
    font-size: 48px; font-weight: bold; overflow: hidden;
  }
  .current-word { color: var(--accent); border-bottom: 4px solid var(--accent); }
  .next-words { color: #ccc; margin-left: 20px; font-size: 32px; }

  .stats-row { display: flex; gap: 20px; margin-bottom: 20px; }
  .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; min-width: 120px; }
</style>
</head>
<body>

<div class="stats-row">
  <div class="stat-card">시간: <span id="stat-timer">60</span></div>
  <div class="stat-card">타수: <span id="stat-wpm">0</span></div>
  <div class="stat-card">정확도: <span id="stat-acc">100</span>%</div>
</div>

<div id="word-display">
  <span id="current-word" class="current-word">준비</span>
  <span id="next-words" class="next-words"></span>
</div>

<input type="text" id="typing-input" placeholder="타이핑 시작..." autofocus>

<script>
  let lang = 'ko';
  let words = ['사랑', '하늘', '바람', '행복', '미래', '열정', '도전', '성공', '노력', '희망'];
  let currentIdx = 0;
  let correctChars = 0; // 한글 자소 기준
  let totalChars = 0;
  let startTime = null;

  const inputEl = document.getElementById('typing-input');
  
  // 한글 자소 분리 함수 (타수 정확도를 위해)
  function getJasoCount(str) {
    // 간단한 자소 계산: 한글은 보통 글자당 2~3자소로 계산
    return str.replace(/[가-힣]/g, (match) => {
      const code = match.charCodeAt(0) - 44032;
      const jong = code % 28;
      return jong > 0 ? "aaa" : "aa";
    }).length;
  }

  inputEl.addEventListener('input', () => {
    if (!startTime) startTime = new Date();
    
    let typed = inputEl.value.trim();
    let target = words[currentIdx];

    if (typed === target) {
      // 정확히 입력 완료 시 기록 반영
      correctChars += (lang === 'ko' ? getJasoCount(target) : target.length);
      totalChars += (lang === 'ko' ? getJasoCount(target) : target.length);
      
      currentIdx++;
      inputEl.value = '';
      updateDisplay();
      calculateRealTimeStats();
    }
  });

  function updateDisplay() {
    document.getElementById('current-word').textContent = words[currentIdx] || '끝!';
    document.getElementById('next-words').textContent = words.slice(currentIdx + 1, currentIdx + 4).join(' ');
  }

  function calculateRealTimeStats() {
    let elapsed = (new Date() - startTime) / 1000 / 60; // 분 단위
    if (elapsed < 0.1) return;
    
    // 1번 요청 반영: 타수 로직 최적화
    let wpm = Math.round(correctChars / elapsed);
    document.getElementById('stat-wpm').textContent = wpm;
  }

  updateDisplay();
</script>
</body>
</html>
