<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타자 연습</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --border: #e2e4ec;
    --accent: #5b4ef0;
    --accent2: #7c6af7;
    --text: #1a1d27;
    --text-dim: #6b7280;
    --text-muted: #c4c8d4;
    --correct: #16a34a;
    --wrong: #dc2626;
    --pending: #9ca3af;
    --cursor-color: #5b4ef0;
    --font-mono: 'JetBrains Mono', monospace;
    --font-ko: 'Noto Sans KR', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ko);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  .header {
    width: 100%;
    max-width: 900px;
    padding: 24px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .site-title {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
  }

  .ctrl-group-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .btn-group {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--font-ko);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    white-space: nowrap;
  }

  .ctrl-btn:hover { color: var(--text); background: rgba(124,106,247,0.08); }
  .ctrl-btn.active { color: var(--accent2); background: rgba(124,106,247,0.18); font-weight: 600; }

  .divider-v {
    width: 1px;
    height: 18px;
    background: var(--border);
  }

  .sep {
    width: 1px;
    height: 22px;
    background: var(--border);
    margin: 0 4px;
  }

  /* ── Main Area ── */
  .main {
    width: 100%;
    max-width: 900px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Stats Row ── */
  .stats-row {
    display: flex;
    gap: 16px;
    justify-content: center;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 24px;
    text-align: center;
    min-width: 90px;
  }

  .stat-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 600;
    color: var(--accent2);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.06em;
  }

  /* Timer gets special color when low */
  .stat-card.timer-card .stat-value { color: var(--text); }
  .stat-card.timer-card.low .stat-value { color: var(--wrong); }

  /* ── Word Mode Display ── */
  #word-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 32px;
    position: relative;
    overflow: hidden;
  }

  .word-queue {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 14px;
    min-height: 88px;
    align-content: flex-start;
  }

  .word-item {
    font-size: 22px;
    font-family: var(--font-mono);
    color: var(--pending);
    transition: color 0.1s;
    line-height: 1.3;
  }

  .word-item.lang-ko { font-family: var(--font-ko); font-size: 20px; }
  .word-item.done { color: var(--text-muted); }
  .word-item.done.correct { color: var(--correct); opacity: 0.5; }
  .word-item.done.wrong { color: var(--wrong); opacity: 0.6; }
  .word-item.current { color: var(--text); }

  /* live character coloring on current word */
  .word-item.current .char { color: var(--text-muted); }
  .word-item.current .char.ok { color: var(--correct); }
  .word-item.current .char.bad { color: var(--wrong); }

  /* ── Para Mode Display ── */
  #para-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 32px;
    display: none;
    position: relative;
  }

  #para-text {
    font-size: 20px;
    line-height: 1.9;
    word-break: break-word;
    word-wrap: break-word;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    max-width: 100%;
  }

  #para-text.lang-ko { font-family: var(--font-ko); font-size: 19px; }
  #para-text.lang-en { font-family: var(--font-mono); font-size: 18px; }

  .para-char { color: var(--pending); }
  .para-char.ok { color: var(--correct); }
  .para-char.bad { color: var(--wrong); background: rgba(248,113,113,0.12); border-radius: 2px; }
  .para-char.cursor {
    border-left: 2px solid var(--cursor-color);
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Input Area ── */
  .input-wrap {
    position: relative;
  }

  #typing-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--font-ko);
    font-size: 17px;
    padding: 14px 18px;
    outline: none;
    caret-color: var(--accent);
    transition: border-color 0.2s;
    resize: none;
    height: 54px;
    overflow: hidden;
  }

  #typing-input.lang-en { font-family: var(--font-mono); }
  #typing-input:focus { border-color: var(--accent); }
  #typing-input:disabled { opacity: 0.4; cursor: not-allowed; }

  .input-hint {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--text-muted);
    pointer-events: none;
  }

  /* ── Result Overlay ── */
  #result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #result-overlay.show { display: flex; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 48px;
    text-align: center;
    min-width: 340px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }

  .result-title {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .result-stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .result-stat { text-align: center; }
  .result-stat .val {
    font-family: var(--font-mono);
    font-size: 36px;
    font-weight: 700;
    color: var(--accent2);
  }
  .result-stat .lbl { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .result-note {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .btn-restart {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-family: var(--font-ko);
    font-weight: 600;
    padding: 12px 32px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-restart:hover { background: var(--accent2); }

  /* ── Start Hint ── */
  .start-hint {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: -8px;
  }

  /* ── Progress bar (para mode) ── */
  .progress-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }
</style>
</head>
<body>

<div class="header">
  <div class="site-title">⌨ 타자 연습</div>
  <div class="controls">
    <span class="ctrl-group-label">모드</span>

      <button class="ctrl-btn active" id="btn-word" onclick="setGameMode('word')">낱말</button>

    <div class="sep"></div>
    <span class="ctrl-group-label">언어</span>
    <div class="btn-group">

      <div class="divider-v"></div>
      <button class="ctrl-btn" id="btn-ko" onclick="setLanguage('ko')">한국어</button>
    </div>
    <div class="sep"></div>
    <span class="ctrl-group-label">시간</span>
    <div class="btn-group">
      <button class="ctrl-btn active" id="btn-1m"  onclick="setTimeLimit(60)">1분</button>
      <div class="divider-v"></div>
      <button class="ctrl-btn" id="btn-3m"  onclick="setTimeLimit(180)">3분</button>
      <div class="divider-v"></div>
      <button class="ctrl-btn" id="btn-5m"  onclick="setTimeLimit(300)">5분</button>
      <div class="divider-v"></div>
      <button class="ctrl-btn" id="btn-free" onclick="setTimeLimit(0)">자유</button>
    </div>
  </div>
</div>

<div class="main">

  <div class="stats-row">
    <div class="stat-card timer-card" id="timer-card">
      <div class="stat-value" id="stat-timer">60</div>
      <div class="stat-label">남은 시간</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-wpm">0</div>
      <div class="stat-label" id="wpm-label">타수 (WPM)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-acc">100</div>
      <div class="stat-label">정확도 (%)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-score">0</div>
      <div class="stat-label" id="score-label">완성 단어</div>
    </div>
  </div>

  <!-- Word Mode -->
  <div id="word-display">
    <div class="word-queue" id="word-queue"></div>
  </div>

  <!-- Para Mode -->
  <div id="para-display">
    <div id="para-text"></div>
  </div>

  <!-- Progress bar -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- Input -->
  <div class="input-wrap">
    <input type="text" id="typing-input" autocomplete="off" autocorrect="off"
           autocapitalize="off" spellcheck="false"
           placeholder="여기를 클릭하고 타이핑을 시작하세요…">
    <span class="input-hint" id="input-hint">Space / Enter → 다음 단어</span>
  </div>

  <p class="start-hint" id="start-hint">타이핑을 시작하면 타이머가 자동으로 시작됩니다</p>

</div>

<!-- Result Modal -->
<div id="result-overlay">
  <div class="result-card">
    <div class="result-title">✓ 결과</div>
    <div class="result-stats">
      <div class="result-stat">
        <div class="val" id="res-wpm">0</div>
        <div class="lbl" id="res-wpm-lbl">타수</div>
      </div>
      <div class="result-stat">
        <div class="val" id="res-acc">0</div>
        <div class="lbl">정확도 (%)</div>
      </div>
      <div class="result-stat">
        <div class="val" id="res-score">0</div>
        <div class="lbl" id="res-score-lbl">완성 단어</div>
      </div>
    </div>
    <div class="result-note" id="res-note"></div>
    <button class="btn-restart" onclick="restartGame()">다시 시작</button>
  </div>
</div>

/* ══════════════════════════════════════════════
   TYPING SPEED CALCULATION
   
   한국어: 타수 = 자소(자음+모음) 수 / 분
     - 한 글자 평균 자소: 2.5 (자음1+중성1+종성0.5 평균)
     - 업계 표준: 글자 수 × 2.5 / 분
   
   영어: WPM = (글자 수 / 5) / 분
     - 표준 단어 = 5자
     - CPM(분당 글자수) / 5 = WPM
   
   이렇게 하면 실제 타이핑 속도와 가장 근접함.
══════════════════════════════════════════════ */
function calcSpeed(chars, seconds) {
  if (seconds < 1) return 0;
  const minutes = seconds / 60;
  if (lang === 'ko') {
    // 한글 타수: 글자 수 × 2.5 / 분  (=분당 자소 수)
    return Math.round((chars * 2.5) / minutes);
  } else {
    // 영어 WPM: (글자 수 / 5) / 분
    return Math.round((chars / 5) / minutes);
  }
}

function speedLabel() {
  return lang === 'ko' ? '타수 (분당)' : 'WPM';
}

/* ══════════════════════════════════════════════
   CONTROL: LANGUAGE / MODE / TIME
══════════════════════════════════════════════ */
function setLanguage(l) {
  lang = l;
  ['en','ko'].forEach(id => {
    document.getElementById('btn-'+id).classList.toggle('active', id === l);
  });
  inputEl.className = (l === 'en') ? 'lang-en' : '';
  document.getElementById('wpm-label').textContent = speedLabel();
  document.getElementById('res-wpm-lbl').textContent = speedLabel();
  restartGame();
}

function setGameMode(m) {
  gameMode = m;
  ['word','para'].forEach(id => {
    document.getElementById('btn-'+id).classList.toggle('active', id === m);
  });
  const isWord = m === 'word';
  document.getElementById('word-display').style.display = isWord ? '' : 'none';
  document.getElementById('para-display').style.display = isWord ? 'none' : '';
  document.getElementById('progress-wrap').style.display = isWord ? 'none' : '';
  document.getElementById('input-hint').textContent = isWord ? 'Space / Enter → 다음 단어' : '그대로 타이핑하세요';
  document.getElementById('score-label').textContent = isWord ? '완성 단어' : '완성 글자';
  document.getElementById('res-score-lbl').textContent = isWord ? '완성 단어' : '완성 글자';
  restartGame();
}

function setTimeLimit(t) {
  timeLimit = t;
  const ids = ['1m','3m','5m','free'];
  const vals = [60, 180, 300, 0];
  ids.forEach((id, i) => {
    document.getElementById('btn-'+id).classList.toggle('active', vals[i] === t);
  });

  const timerCard = document.getElementById('timer-card');
  const timerLabel = timerCard.querySelector('.stat-label');
  if (t === 0) {
    timerLabel.textContent = '경과 시간';
    timerEl.textContent = '0';
  } else {
    timerLabel.textContent = '남은 시간';
    timerEl.textContent = String(t);
  }
  restartGame();
}

/* ══════════════════════════════════════════════
   TIMER
══════════════════════════════════════════════ */
function startTimer() {
  if (timerInterval) return;
  elapsedSeconds = 0;
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    if (timeLimit > 0) {
      timeLeft = Math.max(0, timeLimit - elapsedSeconds);
      timerEl.textContent = String(timeLeft);
      document.getElementById('timer-card').classList.toggle('low', timeLeft <= 10 && timeLeft > 0);
      if (timeLeft === 0) endGame();
    } else {
      timerEl.textContent = String(elapsedSeconds);
    }
    updateStats();
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

/* ══════════════════════════════════════════════
   WORD MODE
══════════════════════════════════════════════ */
const QUEUE_SIZE = 20;

function pickWords(n) {
  const pool = WORDS[lang];
  const result = [];
  for (let i = 0; i < n; i++) result.push(pool[Math.floor(Math.random() * pool.length)]);
  return result;
}

function refillQueue() {
  while (wordQueue.length - wordIndex < QUEUE_SIZE) {
    wordQueue.push(...pickWords(10));
  }
}

function renderWordQueue() {
  const container = document.getElementById('word-queue');
  container.innerHTML = '';
  // Show words from current index, up to QUEUE_SIZE ahead
  const visible = wordQueue.slice(wordIndex, wordIndex + QUEUE_SIZE);
  visible.forEach((w, i) => {
    const span = document.createElement('span');
    span.className = 'word-item' + (lang === 'ko' ? ' lang-ko' : '');
    if (i === 0) {
      span.classList.add('current');
      // Render individual chars for live feedback
      [...w].forEach(ch => {
        const c = document.createElement('span');
        c.className = 'char';
        c.textContent = ch;
        span.appendChild(c);
      });
    } else {
      span.textContent = w;
    }
    container.appendChild(span);
  });
}

function updateCurrentWordHighlight(typed) {
  const container = document.getElementById('word-queue');
  const firstItem = container.querySelector('.word-item.current');
  if (!firstItem) return;
  const chars = firstItem.querySelectorAll('.char');
  chars.forEach((c, i) => {
    c.className = 'char';
    if (i < typed.length) {
      c.classList.add(typed[i] === c.textContent ? 'ok' : 'bad');
    }
  });
}

/* ══════════════════════════════════════════════
   PARA MODE
══════════════════════════════════════════════ */
function loadParagraph() {
  const pool = PARAGRAPHS[lang];
  paraText = pool[Math.floor(Math.random() * pool.length)];
  paraIndex = 0;
  paraCorrect = 0;
  paraTotal = 0;
  renderPara();
}

function renderPara() {
  const el = document.getElementById('para-text');
  el.className = (lang === 'ko') ? 'lang-ko' : 'lang-en';
  el.innerHTML = '';
  [...paraText].forEach((ch, i) => {
    const s = document.createElement('span');
    s.className = 'para-char';
    s.textContent = ch;
    if (i < paraIndex) {
      // already typed
    }
    if (i === paraIndex) s.classList.add('cursor');
    el.appendChild(s);
  });
  updateParaColors();
  updateProgress();
}

function updateParaColors() {
  const el = document.getElementById('para-text');
  const spans = el.querySelectorAll('.para-char');
  spans.forEach((s, i) => {
    s.className = 'para-char';
    if (i === paraIndex) s.classList.add('cursor');
  });
  // will be updated dynamically per keystroke
}

function updateProgress() {
  if (gameMode !== 'para') return;
  const pct = paraText.length > 0 ? (paraIndex / paraText.length) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

/* ══════════════════════════════════════════════
   STATS
══════════════════════════════════════════════ */
function updateStats() {
  const chars = gameMode === 'word' ? correctChars : paraCorrect;
  const speed = calcSpeed(chars, elapsedSeconds || 1);
  wpmEl.textContent = String(speed);
  const total = gameMode === 'word' ? totalTypedChars : paraTotal;
  const acc = total > 0 ? Math.round((correctChars / total) * 100) : 100;
  accEl.textContent = String(Math.max(0, acc));
  scoreEl.textContent = String(gameMode === 'word' ? score : paraCorrect);
}

/* ══════════════════════════════════════════════
   GAME LIFECYCLE
══════════════════════════════════════════════ */
function restartGame() {
  stopTimer();
  gameStarted = false;
  gameOver = false;
  elapsedSeconds = 0;
  score = 0;
  wrongWords = 0;
  correctChars = 0;
  totalTypedChars = 0;

  timeLeft = timeLimit;
  if (timeLimit > 0) {
    timerEl.textContent = String(timeLimit);
    document.getElementById('timer-card').querySelector('.stat-label').textContent = '남은 시간';
  } else {
    timerEl.textContent = '0';
    document.getElementById('timer-card').querySelector('.stat-label').textContent = '경과 시간';
  }
  document.getElementById('timer-card').classList.remove('low');

  wpmEl.textContent = '0';
  accEl.textContent = '100';
  scoreEl.textContent = '0';
  document.getElementById('wpm-label').textContent = speedLabel();

  inputEl.value = '';
  inputEl.disabled = false;
  inputEl.placeholder = '여기를 클릭하고 타이핑을 시작하세요…';
  isComposing = false;

  document.getElementById('result-overlay').classList.remove('show');

  if (gameMode === 'word') {
    wordQueue = [];
    wordIndex = 0;
    refillQueue();
    renderWordQueue();
  } else {
    loadParagraph();
    document.getElementById('progress-wrap').style.display = '';
  }
}

function endGame() {
  if (gameOver) return;
  gameOver = true;
  stopTimer();
  inputEl.disabled = true;

  const chars = gameMode === 'word' ? correctChars : paraCorrect;
  const speed = calcSpeed(chars, elapsedSeconds || 1);
  const total = gameMode === 'word' ? totalTypedChars : paraTotal;
  const acc = total > 0 ? Math.round((correctChars / total) * 100) : 100;

  document.getElementById('res-wpm').textContent = String(speed);
  document.getElementById('res-acc').textContent = String(Math.max(0, acc));
  document.getElementById('res-score').textContent = String(gameMode === 'word' ? score : paraCorrect);

  // Comparison note
  let note = '';
  if (lang === 'ko') {
    if (speed >= 600) note = '매우 빠릅니다! 전문 타이피스트 수준이에요 🎉';
    else if (speed >= 400) note = '빠릅니다! 평균 이상의 타수예요 👍';
    else if (speed >= 250) note = '평균 수준입니다. 꾸준한 연습으로 더 빨라질 수 있어요!';
    else note = '계속 연습하면 분명 빨라질 거예요! 💪';
  } else {
    if (speed >= 80) note = 'Excellent! You\'re faster than most typists 🎉';
    else if (speed >= 50) note = 'Good speed! Above average. Keep it up 👍';
    else if (speed >= 30) note = 'Average speed. Regular practice will help!';
    else note = 'Keep practicing — you\'ll improve quickly! 💪';
  }
  document.getElementById('res-note').textContent = note;
  document.getElementById('result-overlay').classList.add('show');
}

/* ══════════════════════════════════════════════
   INPUT HANDLING
══════════════════════════════════════════════ */

// Composition events (for Korean IME)
inputEl.addEventListener('compositionstart', () => { isComposing = true; });
inputEl.addEventListener('compositionend', e => {
  isComposing = false;
  if (gameMode === 'para' && !gameOver) {
    const composed = e.data || '';
    inputEl.value = '';
    for (const ch of composed) handleParaChar(ch);
  }
});

// Word mode: Space or Enter submits the word
inputEl.addEventListener('keydown', e => {
  if (gameOver) return;
  if (gameMode !== 'word') return;

  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (!gameStarted) {
      gameStarted = true;
      startTimer();
    }
    const val = inputEl.value.trim();
    if (!val) return;
    const target = wordQueue[wordIndex];
    totalTypedChars += target.length;
    if (val === target) {
      score++;
      correctChars += target.length;
    } else {
      wrongWords++;
    }
    wordIndex++;
    refillQueue();
    renderWordQueue();
    inputEl.value = '';
    updateStats();
  }
});

// Word mode: live character highlighting as user types
inputEl.addEventListener('input', e => {
  if (gameOver) return;

  if (!gameStarted && inputEl.value.length > 0) {
    gameStarted = true;
    startTimer();
  }

  if (gameMode === 'word') {
    updateCurrentWordHighlight(inputEl.value);
    return;
  }

  // Para mode
  if (isComposing) return; // wait for composition to complete

  if (inputEl.value) { handleParaChar(inputEl.value[inputEl.value.length - 1]); inputEl.value = ''; }
});

// Para mode: handle each character
function handleParaChar(typed) {
  const target = paraText[paraIndex];
  if (target === undefined) return;

  paraTotal++;
  totalTypedChars++;

  const isCorrect = typed === target;
  if (isCorrect) {
    paraCorrect++;
    correctChars++;
  }

  // Update the rendered char
  const el = document.getElementById('para-text');
  const spans = el.querySelectorAll('.para-char');
  if (spans[paraIndex]) {
    spans[paraIndex].classList.remove('cursor');
    spans[paraIndex].classList.add(isCorrect ? 'ok' : 'bad');
  }

  paraIndex++;

  if (spans[paraIndex]) {
    spans[paraIndex].classList.add('cursor');
  }

  updateProgress();
  updateStats();

  // Para completed
  if (paraIndex >= paraText.length) {
    if (timeLimit === 0) {
      endGame();
    } else {
      // Load new paragraph, continue
      paraIndex = 0;
      loadParagraph();
    }
  }
}

// Para mode: handle backspace
inputEl.addEventListener('keydown', e => {
  if (gameMode !== 'para' || gameOver) return;
  if (e.key === 'Backspace') {
    e.preventDefault();
    if (paraIndex > 0) {
      paraIndex--;
      paraTotal = Math.max(0, paraTotal - 1);
      if (paraCorrect > 0) {
        // check if last char was correct
        const el = document.getElementById('para-text');
        const spans = el.querySelectorAll('.para-char');
        if (spans[paraIndex] && spans[paraIndex].classList.contains('ok')) {
          paraCorrect--;
          correctChars--;
        }
        // remove cursor from current pos
        if (spans[paraIndex + 1]) spans[paraIndex + 1].classList.remove('cursor');
        // reset the char
        spans[paraIndex].className = 'para-char cursor';
      }
    }
    updateStats();
    updateProgress();
  }
});

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
window.onload = () => {
  setLanguage('en');   // English default, active button set inside
  setGameMode('word');
  setTimeLimit(60);
  inputEl.focus();
};
</script>
