<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타자 연습</title>
    <!-- 폰트 및 라이브러리 생략 (이전 코드 유지) -->
    <style>
        /* 수정된 CSS: 장문 텍스트 깨짐 방지 */
        #para-text { word-wrap: break-word; word-break: break-all; white-space: pre-wrap; }
        /* 기존 스타일 유지 */
    </style>
</head>
<body>

<!-- 헤더 구조 변경 -->
<div class="header">
    <div class="controls">
        <span class="ctrl-group-label">모드</span>
        <div class="btn-group">
            <button class="ctrl-btn active" id="btn-word" onclick="setGameMode('word')">낱말</button>
            <div class="divider-v"></div>
            <button class="ctrl-btn" id="btn-para" onclick="setGameMode('para')">장문</button>
        </div>
        <div class="sep"></div>
        <span class="ctrl-group-label">언어</span>
        <div class="btn-group">
            <button class="ctrl-btn" id="btn-en" onclick="setLanguage('en')">English</button>
            <div class="divider-v"></div>
            <button class="ctrl-btn active" id="btn-ko" onclick="setLanguage('ko')">한국어</button>
        </div>
        <div class="sep"></div>
        <span class="ctrl-group-label">시간</span>
        <div class="btn-group">
            <button class="ctrl-btn active" id="btn-1m"  onclick="setTimeLimit(60)">1분</button>
            <div class="divider-v"></div>
            <button class="ctrl-btn" id="btn-3m"  onclick="setTimeLimit(180)">3분</button>
            <div class="divider-v"></div>
            <button class="ctrl-btn" id="btn-5m"  onclick="setTimeLimit(300)">5분</button>
            <div class="divider-v"></div>
            <button class="ctrl-btn" id="btn-free" onclick="setTimeLimit(0)">자유</button>
        </div>
    </div>
</div>

<script>
// [수정사항] 초기값 변경
let lang = 'en', gameMode = 'word', timeLimit = 60;

// [수정사항] 낱말 모드 로직 (영어도 스페이스/엔터 필수)
function wordModeCheck() {
    if (isComposing || gameOver) return;
    const val = inputEl.value.trim();
    // 낱말 모드에서는 입력이 없는 상태에서 단순히 입력 중일 때는 통과
    // 스페이스나 엔터 입력 시에만 체크하도록 이벤트 리스너와 연동
}

// [수정사항] 스페이스/엔터 강제 체크 로직
inputEl.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        const val = inputEl.value.trim();
        const target = wordQueue[wordIndex];
        if (val === target) {
            score++; totalChars += target.length;
            wordIndex++; refillQueue(); renderWordQueue();
            inputEl.value = '';
        }
    }
});

// 기타 초기화 함수들(setLanguage, setTimeLimit 등)에서 위 변수들을 호출하도록 배치
window.onload = () => {
    setLanguage('en');
    setTimeLimit(60);
};

</script>
</body>
</html>
